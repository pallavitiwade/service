

<ul class="list-group">
    <li *ngFor="let todo of todosArr" class="list-group-item d-flex justify-content-between">
        <strong>
            {{todo.todoItem}}
        </strong>

        <div>
            <button (click)="onEditTodo(todo)" mat-raised-button color="primary" class="mr-3">Edit</button>
        <button (click)="onRemove(todo.todoId)" mat-raised-button color="warn">Delete</button>

        </div>
    </li>

</ul>
